name: FMMBedrockBridge
version: ${project.version}
main: de.crazypandas.fmmbedrockbridge.FMMBedrockBridge
api-version: '1.21'
description: Bridge between FreeMinecraftModels and Geyser/Bedrock for custom model display
author: Fabi
website: https://crazypandas.de

depend:
  - FreeMinecraftModels

softdepend:
  - floodgate
  - GeyserUtils
  - PacketEvents

commands:
  fmmbridge:
    description: FMMBedrockBridge admin commands
    usage: /fmmbridge convert [modelId|all]
    permission: fmmbedrockbridge.admin
    permission-message: You don't have permission to use this command.

permissions:
  fmmbedrockbridge.admin:
    description: Access to FMMBedrockBridge admin commands
    default: op
