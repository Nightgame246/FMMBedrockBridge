# FMMBedrockBridge — EM↔Bedrock UX-Bridge
#
# Requires:
#   - FreeMinecraftModels 2.6.0+ with sendCustomModelsToBedrockClients: true
#     (FMM handles mob/static rendering natively for Bedrock)
#   - ResourcePackManager 1.8.0+ (Java→Bedrock pack conversion)
#   - PacketEvents (packet manipulation)
#   - Floodgate (Bedrock player detection)
#
# This plugin only adds the EM UX layer that MagmaGuy doesn't provide natively:
#   - Phase 7.1a/c: Combat-triggered styled BossBar (replaces EM's "Evoker | 2")
#   - Phase 7.1b/c: Combat-triggered nametag overlay (HP / HP-Bar; FMM renders name)
#   - Phase 7.2b: 2D EM UI icons (BagOfCoin, AnvilHammer, ...) via item_model
#     packet injection — fills RPM 1.8.0's gap for legacy custom_model_data
#     overrides on Emerald.

# Master switch
enabled: true

# Debug mode — logs verbose diagnostic info (BossBar UUID claims, Nametag updates,
# item_model injections). See /fmmbridge debug for live state.
debug: false

# Distance in blocks within which Bedrock players are added as viewers of BossBar/Nametag
# controllers. Same range FMM uses for its own model visibility.
entity-view-distance: 50

# Phase 7.1a — BossBar replacement for EliteMobs bosses
phase71a:
  # When true, suppress EliteMobs' own BossBar packets to Bedrock players (Bedrock sees
  # only our replacement BossBar with the styled name). Set to false to see both bars
  # side-by-side as a diagnostic.
  suppress-em-bossbar: true

# Phase 7.1c — Combat-triggered visuals (HP/Bar/BossBar)
phase71c:
  # When true, BossBar appears only during combat (EnterCombat → ExitCombat). Nametag
  # overlay shows HP / Health-Bar during combat; FMM renders the mob name natively.
  # When false, BossBar is always-visible (Phase 7.1a behavior).
  combat-enabled: true
  # EliteMobs sometimes does not fire a second EnterCombat event after combat paused.
  # When true, EliteMobDamagedByPlayerEvent also refreshes Bedrock combat UI. This is
  # the same event EliteMobs uses for Java's HP/name displays.
  damage-refresh-enabled: true
  # When false, HP/Bar stays visible until the display timeout even if EM fires ExitCombat,
  # matching Java's "lingers after last hit" feel more closely.
  hide-on-exit-event: false
  # 0 = use EliteMobs' MobCombatSettings.yml combatDisplayTimeoutSeconds (default 30s).
  # Set a positive tick value to override only the Bedrock overlay timeout.
  damage-timeout-ticks: 0

# Phase 7.2b — EliteMobs 2D UI Custom Items
elite-items:
  # When true, scans EM resource pack for legacy custom_model_data overrides (Emerald +
  # CMD 31173 = BagOfCoin etc.) and injects item_model on inventory packets for Bedrock
  # players so Geyser/RPM routes them to the correct Bedrock identifier.
  enabled: true
  # Path to EliteMobs resource pack folder (relative to server root).
  resource-pack-path: "plugins/EliteMobs/resource_pack"

# Phase 7.2b/maintenance — Drift-Detection für EM-Resource-Pack
maintenance:
  # Wenn der EM-Resource-Pack sich seit dem letzten deployed-Stand geändert hat,
  # gibt die Bridge beim Boot eine markante 7-zeilige WARN-Sequenz im Console-Log aus
  # und schickt jedem Op beim Join eine deutsche Chat-Nachricht mit Click-Action
  # zu /fmmbridge maintenance status. Verwende /fmmbridge maintenance mark-deployed
  # nach jedem Re-Deploy auf den Proxy.
  op-chat-notify: true
