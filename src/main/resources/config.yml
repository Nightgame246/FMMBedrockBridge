# FMMBedrockBridge Configuration

# Enable/Disable the bridge
enabled: true

# Debug mode - logs entity spawn/despawn events
debug: false

# Entity view distance for Bedrock players (in blocks)
# Models outside this range won't be sent to Bedrock clients
entity-view-distance: 50

# Converter settings
converter:
  # Namespace for Bedrock custom entity IDs (e.g. "fmmbridge:wolf_model")
  namespace: "fmmbridge"
  # Output folder for converted skin files (geometry.json + texture.png)
  # These need to be copied into your GeyserUtils skins folder:
  # /extensions/GeyserUtils/skins/<modelId>/
  output-path: "bedrock-skins"
  # Scale factor for Bedrock models. FMM internally scales Java models by ~1.6x
  # (ARMOR_STAND_HEAD_SIZE_MULTIPLIER=0.4 × MODEL_SCALE=4.0). Bedrock models
  # use raw .bbmodel coordinates, so this factor compensates the difference.
  # Adjust if models appear too small or too large on Bedrock.
  model-scale: 1.6

# Phase 7.1a — BossBar replacement for EliteMobs bosses
phase71a:
  # When true, suppress EliteMobs' own BossBar packets to Bedrock players
  # (Bedrock sees only our replacement BossBar with the styled name).
  # Set to false as a diagnostic if you want to see both bars side-by-side.
  suppress-em-bossbar: true
